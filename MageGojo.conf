available=AI故障转移, server-tag-regex=(?i)^(?=.*(家宽|家寬|原生|住宅|ISP|解锁|解鎖|看片|流媒体|流媒體|Residential|Native))(?!.*(剩余|流量|到期|过期|重置|套餐|续费|续期|官网|官方|网址|网站|订阅|客服|工单|公告|访问|失联|防失联|购买|优惠|折扣|有效期|测速|测试|邮箱|更新|频道|群组|电报|欢迎|感谢|游戏|倍率|distance|expire|traffic|reset|🇭🇰|香港|Hong ?Kong|\bHK\b|🇲🇴|澳门|澳門|Macau|Macao|\bMO\b|🇷🇺|俄罗斯|俄羅斯|俄国|俄國|莫斯科|Russia|Moscow|\bRU\b|🇨🇳|大陆|大陸|回国|回國)).*$, img-url=https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Available.png
url-latency-benchmark=Gemini自动, server-tag-regex=(?i)^(?!.*(剩余|流量|到期|过期|重置|套餐|续费|续期|官网|官方|网址|网站|订阅|客服|工单|公告|访问|失联|防失联|购买|优惠|折扣|有效期|测速|测试|邮箱|更新|频道|群组|电报|欢迎|感谢|游戏|倍率|distance|expire|traffic|reset|🇷🇺|俄罗斯|俄羅斯|俄国|俄國|莫斯科|Russia|Moscow|\bRU\b|🇨🇳|大陆|大陸|回国|回國)).*$, check-interval=300, tolerance=50, img-url=https://testingcf.jsdelivr.net/gh/lobehub/lobe-icons@master/packages/static-png/light/gemini-color.png
