# ==============================================================
# Quantumult X 简约配置 · MageGojo
# 仓库: https://github.com/MageGojo/QuantumultX
# 说明: 订阅解析 + AI/常用业务分流 + 地区筛选(排除不支持地区与垃圾节点)
# 图标: AI区=lobehub  功能/地区区=Koolson/Qure  (均走 jsDelivr, 同类风格统一, 无 emoji)
# 详细设计见 docs/设计.md
# ==============================================================

[general]
server_check_url=http://www.gstatic.com/generate_204
resource_parser_url=https://testingcf.jsdelivr.net/gh/KOP-XIAO/QuantumultX@master/Scripts/resource-parser.js
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://testingcf.jsdelivr.net/gh/KOP-XIAO/QuantumultX@master/Scripts/IP_API.js
dns_exclusion_list=*.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn, *.cmbchina.com, *.10086.cn

[dns]
no-ipv6
prefer-doh3
doh-server=https://doh.pub/dns-query, https://dns.alidns.com/dns-query

[policy]
# ---------- AI(纯排除正则含 emoji 国旗) ----------
# 排除式分流：节点名“不含”任一关键词才入选(比白名单更稳，能收纳纯 emoji 命名节点)。
# CN=🇨🇳|大陆|大陸|回国|回國(全组排)；港澳俄=🇭🇰|香港|HK|🇲🇴|澳门|Macau|MO|🇷🇺|俄罗斯|Russia|RU(OpenAI/Claude/GoogleAI 额外排)。
# 注：QX 不支持“单组独立健康检查 URL”(只能用全局 server_check_url)，无法像小火箭那样用 chatgpt.com 探测 OpenAI 可达性；
#     这里用 AI住宅(住宅/家宽节点优先测速)+ AI故障转移(住宅池按序故障转移)逼近——住宅 IP 基本能过 OpenAI/Claude 风控。
#     默认走 AI自动(总有节点不黑洞)；若 ChatGPT 仍被风控且你有住宅/家宽节点，手动切 AI住宅 或 AI故障转移。
# OpenAI / Claude / GoogleAI(走 AI自动)：排 港澳俄陆 + 垃圾
static=OpenAI, AI自动, AI住宅, AI故障转移, 全局自动, direct, server-tag-regex=(?i)^(?!.*(剩余|流量|到期|过期|重置|套餐|续费|续期|官网|官方|网址|网站|订阅|客服|工单|公告|访问|失联|防失联|购买|优惠|折扣|有效期|测速|测试|邮箱|更新|频道|群组|电报|欢迎|感谢|游戏|倍率|distance|expire|traffic|reset|🇭🇰|香港|Hong ?Kong|\bHK\b|🇲🇴|澳门|澳門|Macau|Macao|\bMO\b|🇷🇺|俄罗斯|俄羅斯|俄国|俄國|莫斯科|Russia|Moscow|\bRU\b|🇨🇳|大陆|大陸|回国|回國)).*$, img-url=https://testingcf.jsdelivr.net/gh/lobehub/lobe-icons@master/packages/static-png/light/openai.png
static=Claude, AI自动, AI住宅, AI故障转移, 全局自动, direct, server-tag-regex=(?i)^(?!.*(剩余|流量|到期|过期|重置|套餐|续费|续期|官网|官方|网址|网站|订阅|客服|工单|公告|访问|失联|防失联|购买|优惠|折扣|有效期|测速|测试|邮箱|更新|频道|群组|电报|欢迎|感谢|游戏|倍率|distance|expire|traffic|reset|🇭🇰|香港|Hong ?Kong|\bHK\b|🇲🇴|澳门|澳門|Macau|Macao|\bMO\b|🇷🇺|俄罗斯|俄羅斯|俄国|俄國|莫斯科|Russia|Moscow|\bRU\b|🇨🇳|大陆|大陸|回国|回國)).*$, img-url=https://testingcf.jsdelivr.net/gh/lobehub/lobe-icons@master/packages/static-png/light/claude-color.png
static=GoogleAI, AI自动, AI住宅, AI故障转移, 全局自动, direct, server-tag-regex=(?i)^(?!.*(剩余|流量|到期|过期|重置|套餐|续费|续期|官网|官方|网址|网站|订阅|客服|工单|公告|访问|失联|防失联|购买|优惠|折扣|有效期|测速|测试|邮箱|更新|频道|群组|电报|欢迎|感谢|游戏|倍率|distance|expire|traffic|reset|🇭🇰|香港|Hong ?Kong|\bHK\b|🇲🇴|澳门|澳門|Macau|Macao|\bMO\b|🇷🇺|俄罗斯|俄羅斯|俄国|俄國|莫斯科|Russia|Moscow|\bRU\b|🇨🇳|大陆|大陸|回国|回國)).*$, img-url=https://testingcf.jsdelivr.net/gh/lobehub/lobe-icons@master/packages/static-png/light/google-color.png
# Gemini(网页版，走 Gemini自动)：放行港澳，排 俄 + 中国 + 垃圾
static=Gemini, Gemini自动, 全局自动, direct, server-tag-regex=(?i)^(?!.*(剩余|流量|到期|过期|重置|套餐|续费|续期|官网|官方|网址|网站|订阅|客服|工单|公告|访问|失联|防失联|购买|优惠|折扣|有效期|测速|测试|邮箱|更新|频道|群组|电报|欢迎|感谢|游戏|倍率|distance|expire|traffic|reset|🇷🇺|俄罗斯|俄羅斯|俄国|俄國|莫斯科|Russia|Moscow|\bRU\b|🇨🇳|大陆|大陸|回国|回國)).*$, img-url=https://testingcf.jsdelivr.net/gh/lobehub/lobe-icons@master/packages/static-png/light/gemini-color.png
# GoogleSearch(谷歌搜索，走 Google自动)：仅排 中国大陆 + 垃圾
static=GoogleSearch, Google自动, 全局自动, direct, server-tag-regex=(?i)^(?!.*(剩余|流量|到期|过期|重置|套餐|续费|续期|官网|官方|网址|网站|订阅|客服|工单|公告|访问|失联|防失联|购买|优惠|折扣|有效期|测速|测试|邮箱|更新|频道|群组|电报|欢迎|感谢|游戏|倍率|distance|expire|traffic|reset|🇨🇳|大陆|大陸|回国|回國)).*$, img-url=https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google_Search.png

# ---------- 系统服务(默认直连，可切代理) ----------
static=苹果服务, direct, 代理, img-url=https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Apple.png
static=微软服务, direct, 代理, img-url=https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Microsoft.png

# ---------- 国内 / 拦截 / 兜底 ----------
# 注：GitHub/YouTube/TikTok/国际媒体 等业务组已删除——精简后这些流量统一落到「漏网之鱼」走代理，
#     不再单设组(避免空挂的孤儿策略组)。需要单独区分时，自行在 [filter_local] 加 host-suffix 规则 + 对应组即可。
static=国内服务, direct, 代理, img-url=https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/China.png
static=广告拦截, reject, direct, 代理, img-url=https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Advertising.png
static=漏网之鱼, 代理, 全局自动, direct, img-url=https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Final.png

# ---------- 手动总组 ----------
static=代理, 全局自动, direct, server-tag-regex=(?i)^(?!.*(剩余|流量|到期|过期|重置|套餐|续费|续期|官网|官方|网址|网站|订阅|客服|工单|公告|访问|失联|防失联|购买|优惠|折扣|有效期|测速|测试|邮箱|更新|频道|群组|电报|欢迎|感谢|游戏|倍率|distance|expire|traffic|reset|🇨🇳|大陆|大陸|回国|回國)).*$, img-url=https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png

# ---------- 自动测速 / 住宅 / 故障转移 基础组(纯排除) ----------
url-latency-benchmark=全局自动, server-tag-regex=(?i)^(?!.*(剩余|流量|到期|过期|重置|套餐|续费|续期|官网|官方|网址|网站|订阅|客服|工单|公告|访问|失联|防失联|购买|优惠|折扣|有效期|测速|测试|邮箱|更新|频道|群组|电报|欢迎|感谢|游戏|倍率|distance|expire|traffic|reset|🇨🇳|大陆|大陸|回国|回國)).*$, check-interval=180, tolerance=50, img-url=https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png
# AI自动：排 港澳俄陆 + 垃圾，取延迟最低(OpenAI/Claude/GoogleAI 默认)
url-latency-benchmark=AI自动, server-tag-regex=(?i)^(?!.*(剩余|流量|到期|过期|重置|套餐|续费|续期|官网|官方|网址|网站|订阅|客服|工单|公告|访问|失联|防失联|购买|优惠|折扣|有效期|测速|测试|邮箱|更新|频道|群组|电报|欢迎|感谢|游戏|倍率|distance|expire|traffic|reset|🇭🇰|香港|Hong ?Kong|\bHK\b|🇲🇴|澳门|澳門|Macau|Macao|\bMO\b|🇷🇺|俄罗斯|俄羅斯|俄国|俄國|莫斯科|Russia|Moscow|\bRU\b|🇨🇳|大陆|大陸|回国|回國)).*$, check-interval=300, tolerance=50, img-url=https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/AI.png
# AI住宅：仅 住宅/家宽/原生/解锁/流媒体 节点(正向先行)，再排 港澳俄陆 + 垃圾，取延迟最低
url-latency-benchmark=AI住宅, server-tag-regex=(?i)^(?=.*(家宽|家寬|原生|住宅|ISP|解锁|解鎖|看片|流媒体|流媒體|Residential|Native))(?!.*(剩余|流量|到期|过期|重置|套餐|续费|续期|官网|官方|网址|网站|订阅|客服|工单|公告|访问|失联|防失联|购买|优惠|折扣|有效期|测速|测试|邮箱|更新|频道|群组|电报|欢迎|感谢|游戏|倍率|distance|expire|traffic|reset|🇭🇰|香港|Hong ?Kong|\bHK\b|🇲🇴|澳门|澳門|Macau|Macao|\bMO\b|🇷🇺|俄罗斯|俄羅斯|俄国|俄國|莫斯科|Russia|Moscow|\bRU\b|🇨🇳|大陆|大陸|回国|回國)).*$, check-interval=300, tolerance=50, img-url=https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Server.png
