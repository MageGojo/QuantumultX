# ==============================================================
# Quantumult X 简约配置 · MageGojo
# 仓库: https://github.com/MageGojo/QuantumultX
# 说明: 订阅解析 + AI/常用业务分流 + 地区筛选(排除不支持地区与垃圾节点)
# 图标: AI区=lobehub  功能/地区区=Koolson/Qure  (均走 jsDelivr, 同类风格统一, 无 emoji)
# 详细设计见 docs/设计.md
# ==============================================================

[general]
server_check_url=http://www.gstatic.com/generate_204
resource_parser_url=https://cdn.jsdelivr.net/gh/KOP-XIAO/QuantumultX@master/Scripts/resource-parser.js
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://cdn.jsdelivr.net/gh/KOP-XIAO/QuantumultX@master/Scripts/IP_API.js
dns_exclusion_list=*.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn, *.cmbchina.com, *.10086.cn

[dns]
no-ipv6
prefer-doh3
doh-server=https://doh.pub/dns-query, https://dns.alidns.com/dns-query

[policy]
# ---------- AI ----------
static=OpenAI, AI自动, server-tag-regex=(?i)^(?!.*(剩余|过期|官网|流量|游戏|失联|客服|群组|倍率|网址|测试|expire|香港|hk|hong|回国|中国))(?=.*(美|united|usa|日|jp|新|sg|台|tw|韩|kr|英|uk|德|de)).*$, img-url=https://cdn.jsdelivr.net/npm/@lobehub/icons-static-png/light/openai.png
static=Gemini, AI自动, server-tag-regex=(?i)^(?!.*(剩余|过期|官网|流量|游戏|失联|客服|群组|倍率|网址|测试|expire|香港|hk|hong|回国|中国))(?=.*(美|united|usa|日|jp|新|sg|台|tw|韩|kr|英|uk|德|de)).*$, img-url=https://cdn.jsdelivr.net/npm/@lobehub/icons-static-png/light/gemini-color.png
static=Claude, AI自动, server-tag-regex=(?i)^(?!.*(剩余|过期|官网|流量|游戏|失联|客服|群组|倍率|网址|测试|expire|香港|hk|hong|回国|中国))(?=.*(美|united|usa|日|jp|新|sg|台|tw|韩|kr|英|uk|德|de)).*$, img-url=https://cdn.jsdelivr.net/npm/@lobehub/icons-static-png/light/claude-color.png
static=Google, AI自动, server-tag-regex=(?i)^(?!.*(剩余|过期|官网|流量|游戏|失联|客服|群组|倍率|网址|测试|expire|香港|hk|hong|回国|中国))(?=.*(美|united|usa|日|jp|新|sg|台|tw|韩|kr|英|uk|德|de)).*$, img-url=https://cdn.jsdelivr.net/npm/@lobehub/icons-static-png/light/google-color.png

# ---------- 常用业务 ----------
static=GitHub, 代理, 全局自动, direct, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/GitHub.png
static=YouTube, 代理, 全局自动, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
static=TikTok, 代理, 全局自动, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/TikTok.png
static=国际媒体, 代理, 全局自动, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Netflix.png

# ---------- 系统/区域服务 ----------
static=微软服务, direct, 代理, 全局自动, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Microsoft.png
static=苹果服务, direct, 代理, 全局自动, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Apple.png
static=国内服务, direct, 代理, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/China.png

# ---------- 拦截/兜底 ----------
static=广告拦截, reject, direct, 代理, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Advertising.png
static=漏网之鱼, 代理, 全局自动, direct, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Final.png

# ---------- 手动总组 ----------
static=代理, 全局自动, direct, server-tag-regex=(?i)^(?!.*(剩余|过期|官网|流量|游戏|失联|客服|群组|倍率|网址|测试|expire|回国)).*$, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png

# ---------- 自动测速基础组 ----------
url-latency-benchmark=全局自动, server-tag-regex=(?i)^(?!.*(剩余|过期|官网|流量|游戏|失联|客服|群组|倍率|网址|测试|expire|distance|回国)).*$, check-interval=600, tolerance=100, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png
url-latency-benchmark=AI自动, server-tag-regex=(?i)^(?!.*(剩余|过期|官网|流量|游戏|失联|客服|群组|倍率|网址|测试|expire|香港|hk|hong|回国|中国))(?=.*(美|united|usa|日|jp|新|sg|台|tw|韩|kr|英|uk|德|de)).*$, check-interval=600, tolerance=100, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/AI.png

